<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>@yrizzme notes</title>
<style>
body { font-family: Arial, sans-serif; margin:0; padding:10px; background:#d3d3ff; color:#000; }
body.dark { background:#111; color:#eee; }
.container { max-width:480px; margin:0 auto; border:1px solid #aaa; padding:10px; background:inherit; }
.header { text-align:center; margin-bottom:10px; }
.badge { font-size:11px; padding:3px 6px; border:1px solid #666; display:inline-block; margin-top:5px; }
textarea, button { width:100%; margin-top:6px; padding:6px; font-size:14px; box-sizing:border-box; }
button { cursor:pointer; }

/* chat mode folder list */
.chat-folder-list div { cursor:pointer; margin-bottom:4px; padding:4px; border:1px solid #ccc; border-radius:2px; background:#fff; }
body.dark .chat-folder-list div { background:#222; border-color:#444; }

/* chat mode small inline buttons */
.chat-btn {
    display:inline-block;
    padding:2px 4px;
    font-size:10px;
    margin-right:2px;
    margin-bottom:2px;
    width:auto;
    border-radius:0;
}

/* chat display */
#notesList { white-space: pre-wrap; font-size:12px; margin-top:10px; background:#fafafa; padding:6px; border:1px solid #ccc; border-radius:4px; min-height:100px; overflow-y:auto; max-height:300px; }
body.dark #notesList { background:#222; border-color:#444; color:#eee; }
</style>
</head>
<body>
<div class="container">
    <div class="header">
        <h2>@yrizzme notes</h2>
        <div id="statusBadge" class="badge">chat mode</div>
        <button onclick="toggleDark()">toggle dark</button>
    </div>

    <textarea id="noteText" placeholder="type message..." onkeyup="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault(); saveMessage();}"></textarea>
    <button onclick="saveMessage()" id="sendBtn">send</button>

    <!-- chat display -->
    <div id="notesList"></div>

    <!-- chat mode folder buttons -->
    <div style="margin-top:10px;">
        <button class="chat-btn" onclick="showNewFolderInput()">new folder</button>
        <button class="chat-btn" onclick="showRenameFolderInput()">rename folder</button>
        <button class="chat-btn" onclick="deleteFolder()">delete folder</button>
        <input type="text" id="newFolderInput" placeholder="folder name..." style="display:none; width:100%; margin-top:6px;">
        <button id="createFolderBtn" onclick="createFolder()" style="display:none;">create</button>
        <input type="text" id="renameFolderInput" placeholder="new name..." style="display:none; width:100%; margin-top:6px;">
        <button id="renameFolderBtn" onclick="renameFolder()" style="display:none;">rename</button>
    </div>

    <div class="chat-folder-list" id="chatFolderList"></div>
</div>

<script>
// ===== CHAT MODE ONLY =====
var folders = ['default','school','random'];
var selectedFolder = 'default';

// ===== INIT =====
function init(){
    if(localStorage.getItem('dark')==='1') document.body.className='dark';
    loadFolders();
    displayFolders();
    displayChat();
}
init();

// ===== DARK MODE =====
function toggleDark(){if(document.body.className.indexOf('dark')!==-1){document.body.className=''; localStorage.setItem('dark','0');} else{document.body.className='dark'; localStorage.setItem('dark','1');}}

// ===== CHAT FUNCTIONS =====
function saveMessage(){
    if(!selectedFolder) selectedFolder='default';
    var text = document.getElementById('noteText').value.trim();
    if(!text) return;
    var key = 'yrizzme_chat_' + selectedFolder;
    var chat = localStorage.getItem(key) || '';
    var timestamp = new Date().toLocaleString();
    chat += '['+timestamp+'] '+text+'\n';
    localStorage.setItem(key, chat);
    document.getElementById('noteText').value = '';
    displayChat();
}
function displayChat(){
    if(!selectedFolder) selectedFolder='default';
    var key = 'yrizzme_chat_' + selectedFolder;
    document.getElementById('notesList').innerText = localStorage.getItem(key) || '';
}

// ===== FOLDER MANAGEMENT =====
function loadFolders(){try{var l=JSON.parse(localStorage.getItem('yrizzme_folders')); if(l && l.length>0) folders=l;}catch(e){}}
function saveFolders(){localStorage.setItem('yrizzme_folders',JSON.stringify(folders));}

function displayFolders(){
    var html=''; 
    for(var i=0;i<folders.length;i++){
        var f=folders[i]; 
        var selStyle = (f===selectedFolder)?'background:rgba(0,120,255,0.2);':'';
        html+='<div onclick="selectFolder(\''+f+'\')" style="'+selStyle+'">'+f+'</div>';
    }
    document.getElementById('chatFolderList').innerHTML=html;
}

function selectFolder(name){selectedFolder=name; displayFolders(); displayChat();}

function showNewFolderInput(){hideAllInputs(); document.getElementById('newFolderInput').style.display='block'; document.getElementById('createFolderBtn').style.display='block'; document.getElementById('newFolderInput').focus();}
function showRenameFolderInput(){hideAllInputs(); document.getElementById('renameFolderInput').style.display='block'; document.getElementById('renameFolderBtn').style.display='block'; document.getElementById('renameFolderInput').value=selectedFolder; document.getElementById('renameFolderInput').focus();}
function hideAllInputs(){['newFolderInput','createFolderBtn','renameFolderInput','renameFolderBtn'].forEach(function(id){document.getElementById(id).style.display='none'; document.getElementById(id).value='';});}

function createFolder(){
    var name=document.getElementById('newFolderInput').value.trim();
    if(!name){alert('please enter a folder name'); return;}
    if(name.toLowerCase()==='all'){alert('"all" is reserved'); return;}
    if(folders.indexOf(name)!==-1){alert('folder already exists'); return;}
    folders.push(name); saveFolders(); displayFolders(); hideAllInputs();
}

function renameFolder(){
    var newName=document.getElementById('renameFolderInput').value.trim();
    if(!newName){alert('please enter a new name'); return;}
    if(newName.toLowerCase()==='all'){alert('"all" is reserved'); return;}
    if(newName===selectedFolder){hideAllInputs(); return;}
    if(folders.indexOf(newName)!==-1){alert('folder name already exists'); return;}
    // move messages to new key
    var oldKey = 'yrizzme_chat_' + selectedFolder;
    var newKey = 'yrizzme_chat_' + newName;
    var data = localStorage.getItem(oldKey);
    if(data) localStorage.setItem(newKey, data);
    localStorage.removeItem(oldKey);
    for(var i=0;i<folders.length;i++) if(folders[i]===selectedFolder) folders[i]=newName;
    selectedFolder=newName; saveFolders(); displayFolders(); displayChat(); hideAllInputs();
}

function deleteFolder(){
    if(!selectedFolder){alert('please select a folder to delete'); return;}
    if(!confirm('delete folder "'+selectedFolder+'"?')) return;
    // remove chat data
    var key = 'yrizzme_chat_' + selectedFolder;
    localStorage.removeItem(key);
    folders = folders.filter(f=>f!==selectedFolder);
    if(folders.indexOf('default')===-1) folders.unshift('default');
    selectedFolder='default';
    saveFolders();
    displayFolders();
    displayChat();
}
</script>
</body>
</html>
