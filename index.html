<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>yahya’s notes</title>

        <style>
            @import url("https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap");

            :root {
                --lavender: #c1baff;
                --warm: #f8ebe4;
                --dark: #1a1a1a;
                --grey: #666;
            }

            body {
                margin: 0;
                font-family: "Inter", sans-serif;
                background: var(--warm);
                color: var(--dark);
                display: flex;
                justify-content: center;
                padding: 3rem 1.5rem;
            }
            
            .top-nav {
      position: absolute;
      top: 2rem;
      right: 2rem;
      display: flex;
      gap: 1.5rem;
      font-size: 0.9rem;
      font-weight: 400;
    }

            .top-nav a {
      text-decoration: none;
      color: var(--dark);
      transition: 0.2s ease;
    }

            .top-nav a:hover {
      color: var(--lavender);
    }

            .container {
                max-width: 600px;
                width: 100%;
            }

            h2 {
                margin: 0 0 2rem 0;
                font-weight: 600;
            }

            textarea {
                width: 100%;
                padding: 10px;
                font-size: 14px;
                border: 1px solid #ddd;
                border-radius: 6px;
                resize: none;
                box-sizing: border-box;
                font-family: inherit;
            }

            input {
                width: 100%;
                padding: 8px;
                margin-top: 10px;
                border: 1px solid #ddd;
                border-radius: 6px;
                box-sizing: border-box;
                font-family: inherit;
            }

            .folder-bar {
                display: flex;
                gap: 8px;
                flex-wrap: wrap;
                margin-bottom: 1rem;
                align-items: center;
            }

            .folder {
                font-size: 12px;
                padding: 4px 8px;
                border: 1px solid #ddd;
                cursor: pointer;
            }

            .folder.active {
                border-color: var(--lavender);
                color: var(--lavender);
            }

            .note {
                border-top: 1px solid #eee;
                padding: 10px 0;
                font-size: 14px;
            }

            .note small {
                color: var(--grey);
                font-size: 11px;
            }

            .delete {
                font-size: 11px;
                cursor: pointer;
                color: var(--grey);
                margin-left: 8px;
            }

            .delete:hover {
                color: red;
            }

            button {
                margin-top: 8px;
                padding: 6px 10px;
                font-size: 13px;
                border: 1px solid #ddd;
                background: white;
                cursor: pointer;
                transition: 0.2s ease;
            }

            button:hover {
                border-color: var(--lavender);
            }

            .footer {
                margin-top: 3rem;
                font-size: 11px;
                color: var(--grey);
            }
            
            
                .sub-footer {
      font-size: 10.5px;
      color: var(--grey);
   
    }



    .sub-sub-footer {
      font-size: 10.5px;
      opacity: 0.7;
    }
        </style>
    </head>

    <body>
          <nav class="top-nav">
    <a href="https://blog.yahyarizmi.com">blog</a>
    <a href="https://contact.yahyarizmi.com">contact</a>
    <a href="https://recipes.yahyarizmi.com">recipes</a>
    <a href="https://notes.yahyarizmi.com">notes</a>
    <a href="https://yahyarizmi.com">home</a>
  </nav>
        <div class="container">
            <h2>yahya’s notes<span style="color: var(--lavender)">.</span></h2>

            <div class="folder-bar" id="folderBar"></div>

            <textarea
                id="noteInput"
                rows="3"
                placeholder="type here... (autosaves on enter)"
            ></textarea>
            <input id="searchInput" placeholder="search notes..." />

            <div id="notesList"></div>

            <div class="footer">local only · markdown supported</div>
<div class="sub-footer">yahyarizmi · 🇱🇰🇬🇧 · 2026</div>
  <div class="sub-sub-footer">
    📍in london rn
  </div>
        </div>

        <script>
            // ===== DATA =====
            let folders = JSON.parse(localStorage.getItem("yn_folders")) || [
                "default",
            ];
            let selectedFolder = folders[0];

            // ===== STORAGE HELPERS =====
            function saveFolders() {
                localStorage.setItem("yn_folders", JSON.stringify(folders));
            }

            function getNotes(folder) {
                return (
                    JSON.parse(localStorage.getItem("yn_notes_" + folder)) || []
                );
            }

            function saveNotes(folder, notes) {
                localStorage.setItem(
                    "yn_notes_" + folder,
                    JSON.stringify(notes),
                );
            }

            // ===== MARKDOWN (basic) =====
            function md(text) {
                return text
                    .replace(/^### (.*$)/gim, "<h4>$1</h4>")
                    .replace(/^## (.*$)/gim, "<h3>$1</h3>")
                    .replace(/^# (.*$)/gim, "<h2>$1</h2>")
                    .replace(/\*\*(.*?)\*\*/gim, "<strong>$1</strong>")
                    .replace(/\*(.*?)\*/gim, "<em>$1</em>")
                    .replace(/\n/g, "<br>");
            }

            // ===== FOLDER UI =====
            function renderDeleteFolderBtn() {
                let existing = document.getElementById("deleteFolderBtn");
                if (existing) existing.remove();
                if (selectedFolder === "default") return;

                const btn = document.createElement("button");
                btn.id = "deleteFolderBtn";
                btn.innerText = "delete folder";
                btn.onclick = () => {
                    if (
                        !confirm(
                            `delete folder "${selectedFolder}" and all its notes?`,
                        )
                    )
                        return;
                    localStorage.removeItem("yn_notes_" + selectedFolder);
                    folders = folders.filter((f) => f !== selectedFolder);
                    saveFolders();
                    selectedFolder = folders[0];
                    renderFolders();
                    renderNotes();
                    renderDeleteFolderBtn();
                };
                document.getElementById("folderBar").appendChild(btn);
            }

            function renderFolders() {
                const bar = document.getElementById("folderBar");
                bar.innerHTML = "";

                folders.forEach((f) => {
                    const div = document.createElement("div");
                    div.className =
                        "folder" + (f === selectedFolder ? " active" : "");
                    div.innerText = f;
                    div.onclick = () => {
                        selectedFolder = f;
                        renderFolders();
                        renderNotes();
                        renderDeleteFolderBtn();
                    };
                    bar.appendChild(div);
                });

                // add folder button
                const add = document.createElement("div");
                add.className = "folder";
                add.innerText = "+";
                add.onclick = () => {
                    const name = prompt("new folder name?");
                    if (!name || folders.includes(name)) return;
                    folders.push(name);
                    saveFolders();
                    selectedFolder = name;
                    renderFolders();
                    renderNotes();
                    renderDeleteFolderBtn();
                };
                bar.appendChild(add);

                renderDeleteFolderBtn();
            }

            // ===== NOTES =====
            function renderNotes() {
                const list = document.getElementById("notesList");
                const search = document
                    .getElementById("searchInput")
                    .value.toLowerCase();
                const notes = getNotes(selectedFolder);

                list.innerHTML = "";

                notes
                    .filter((n) => n.content.toLowerCase().includes(search))
                    .forEach((note, i) => {
                        const div = document.createElement("div");
                        div.className = "note";
                        div.innerHTML = `
        <div>${md(note.content)}</div>
        <small>${note.date}</small>
        <span class="delete" onclick="deleteNote(${i})">delete</span>
      `;
                        list.appendChild(div);
                    });
            }

            function deleteNote(index) {
                let notes = getNotes(selectedFolder);
                notes.splice(index, 1);
                saveNotes(selectedFolder, notes);
                renderNotes();
            }

            // ===== AUTOSAVE =====
            document
                .getElementById("noteInput")
                .addEventListener("keydown", (e) => {
                    if (e.key === "Enter" && !e.shiftKey) {
                        e.preventDefault();
                        const text = e.target.value.trim();
                        if (!text) return;

                        const notes = getNotes(selectedFolder);
                        notes.unshift({
                            content: text,
                            date: new Date().toLocaleString(),
                        });

                        saveNotes(selectedFolder, notes);
                        e.target.value = "";
                        renderNotes();
                    }
                });

            // ===== SEARCH =====
            document
                .getElementById("searchInput")
                .addEventListener("input", renderNotes);

            // ===== INIT =====
            renderFolders();
            renderNotes();
        </script>
    </body>
</html>
